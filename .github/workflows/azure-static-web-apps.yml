name: Build and deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_SAND_07BDFCC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # `dist/` is what Vite produces. We hand it to SWA verbatim, so
          # `app_build_command` / `app_location` are tuned to skip Oryx's
          # auto-build (we already built in the previous step). This avoids
          # double-builds and works around Oryx version drift on Vite 7+.
          skip_app_build: true
          app_location: dist
          output_location: ''
          # Azure Functions API for the AI coloring-page proxy. SWA's Oryx
          # builder runs `npm install && npm run build` inside this folder
          # and packages the compiled JS as managed Functions. The
          # POLLINATIONS_KEY env var must be set in the Azure portal:
          # SWA → Configuration → Application settings.
          api_location: api

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_SAND_07BDFCC03 }}
          action: close
