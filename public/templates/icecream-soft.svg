    <!-- Cone -->
    <path d="M 55 100 L 145 100 L 100 180 Z"/>
    <!-- Waffle pattern -->
    <line x1="68" y1="118" x2="132" y2="118"/>
    <line x1="76" y1="138" x2="124" y2="138"/>
    <line x1="84" y1="158" x2="116" y2="158"/>
    <line x1="78" y1="100" x2="115" y2="175"/>
    <line x1="122" y1="100" x2="85" y2="175"/>
  </g>
</svg>
