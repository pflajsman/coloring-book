<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Soft-serve swirl: stack of 3 lobes tapering up -->
    <path d="M 60 100 Q 60 85 100 85 Q 140 85 140 100 Z"/>
    <path d="M 70 85 Q 70 70 100 70 Q 130 70 130 85"/>
    <path d="M 80 70 Q 80 56 100 56 Q 120 56 120 70"/>
